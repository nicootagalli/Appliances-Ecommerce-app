spring.application.name=sale-service

server.port = 8086
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/service-sale?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ACTUATOR / MANAGEMENT
management.tracing.sampling.probability=1.0
management.health.circuitbreaker.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# RESILIENCE4J CIRCUIT BREAKER
resilience4j.circuitbreaker.instances.sale-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.sale-service.eventConsumerBufferSize=10
resilience4j.circuitbreaker.instances.sale-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.sale-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.sale-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.sale-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.sale-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.sale-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.sale-service.slidingWindowType=COUNT_BASED